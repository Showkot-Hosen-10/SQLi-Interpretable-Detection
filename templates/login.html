{% extends "base.html" %}
{% block title %}Login - Academic Portal{% endblock %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 400px;">
        <h2><i class="fas fa-sign-in-alt"></i> Student Login</h2>
        <form method="POST">
            <div style="margin-bottom: 1rem;">
                <input type="text" name="username" placeholder="Username" required style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            </div>
            <button type="submit" class="btn" style="width: 100%;">Login <i class="fas fa-arrow-right"></i></button>
        </form>
        <div style="margin-top: 1.5rem; padding: 1rem; background: #f8f9fa; border-radius: 8px; font-size: 14px;">
            <strong>Demo Credentials:</strong><br>
            Student: <code>student</code> / <code>student123</code><br>
            Admin: <code>admin</code> / <code>admin123</code>
        </div>
        <div style="margin-top: 1rem; text-align: center;">
            <a href="{{ url_for('register') }}" class="btn" style="background: #00b894;">Create New Profile</a>
        </div>
    </div>
</div>
{% endblock %}
